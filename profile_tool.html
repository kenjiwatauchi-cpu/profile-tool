<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わたしのプロフシートをつくろう</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: #FAF8F3;
    color: #1E1B4B;
    min-height: 100vh;
  }

  /* ヘッダー */
  .header {
    background: #7C3AED;
    padding: 20px 24px 16px;
    color: #fff;
  }
  .header-sub { font-size: 12px; letter-spacing: .1em; opacity: .8; margin-bottom: 4px; }
  .header-title { font-size: 22px; font-weight: 700; }

  /* ステップバー */
  .step-bar {
    display: flex;
    background: #EDE9FE;
    padding: 0 24px;
    gap: 0;
    overflow-x: auto;
  }
  .step-tab {
    padding: 10px 18px;
    font-size: 12px;
    font-weight: 700;
    color: #7C3AED;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    cursor: default;
    opacity: .5;
  }
  .step-tab.active {
    border-bottom-color: #7C3AED;
    opacity: 1;
  }
  .step-tab.done { opacity: .7; }

  /* メインコンテナ */
  .main { max-width: 680px; margin: 0 auto; padding: 24px 16px 80px; }

  /* セクションラベル */
  .sec-label {
    font-size: 11px;
    font-weight: 700;
    color: #7C3AED;
    letter-spacing: .08em;
    text-transform: uppercase;
    margin: 20px 0 8px;
  }
  .sec-label:first-child { margin-top: 0; }

  /* インプット */
  input[type=text] {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid #C4B5FD;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    background: #fff;
    color: #1E1B4B;
    outline: none;
    transition: border-color .15s;
  }
  input[type=text]:focus { border-color: #7C3AED; }

  /* 特徴行 */
  .trait-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .trait-row input { flex: 1; }
  .stars { display: flex; gap: 3px; }
  .star {
    width: 30px; height: 30px;
    border-radius: 6px;
    border: 1.5px solid #C4B5FD;
    background: #F5F3FF;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    cursor: pointer;
    color: #C4B5FD;
    user-select: none;
    transition: background .1s;
  }
  .star.on { background: #FBBF24; color: #92400E; border-color: #FBBF24; }

  /* タグ入力 */
  .tag-input-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .tag-input-row input { flex: 1; }
  .tag-input-row button {
    padding: 0 16px;
    background: #7C3AED;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }
  .tag-input-row button:hover { background: #6D28D9; }

  .tags { display: flex; flex-wrap: wrap; gap: 6px; min-height: 10px; }
  .tag {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    background: #EDE9FE;
    color: #5B21B6;
    border: 1px solid #C4B5FD;
    cursor: pointer;
    display: flex; align-items: center; gap: 4px;
  }
  .tag .x { font-size: 11px; opacity: .6; }
  .tag:hover { background: #DDD6FE; }

  /* 生成ボタン */
  .gen-btn {
    display: block;
    width: 100%;
    margin-top: 28px;
    padding: 14px;
    background: #7C3AED;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: .03em;
    transition: background .15s, transform .1s;
  }
  .gen-btn:hover { background: #6D28D9; }
  .gen-btn:active { transform: scale(.98); }

  /* 結果エリア */
  .result-section { display: none; margin-top: 36px; }

  .result-card {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #E5E7EB;
    padding: 20px;
    margin-bottom: 16px;
  }
  .result-card-title {
    font-size: 11px;
    font-weight: 700;
    color: #7C3AED;
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .chart-wrap {
    display: flex;
    justify-content: center;
    margin: 8px 0;
  }

  /* プロンプトボックス */
  .prompt-lang {
    font-size: 11px;
    font-weight: 700;
    color: #9CA3AF;
    margin-bottom: 6px;
    letter-spacing: .05em;
  }
  .prompt-text {
    font-size: 12px;
    line-height: 1.75;
    color: #374151;
    white-space: pre-wrap;
    word-break: break-all;
    background: #F9FAFB;
    border-radius: 8px;
    padding: 12px;
    border: 1px solid #E5E7EB;
  }
  .copy-btn {
    margin-top: 10px;
    padding: 8px 20px;
    background: #fff;
    color: #7C3AED;
    border: 1.5px solid #7C3AED;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background .1s;
  }
  .copy-btn:hover { background: #EDE9FE; }
  .copy-btn.copied { background: #7C3AED; color: #fff; }

  /* ヒントバナー */
  .hint-banner {
    background: #FEF3C7;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: #92400E;
    font-weight: 600;
    margin-top: 8px;
  }

  /* フッター */
  .footer {
    text-align: center;
    font-size: 11px;
    color: #9CA3AF;
    margin-top: 48px;
    padding-bottom: 24px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-sub">自己理解ワーク</div>
  <div class="header-title">わたしのプロフシートをつくろう</div>
</div>

<div class="step-bar">
  <div class="step-tab active">STEP 1　情報入力</div>
  <div class="step-tab" id="step2tab">STEP 2　チャート確認</div>
  <div class="step-tab" id="step3tab">STEP 3　キャラ生成</div>
</div>

<div class="main">

  <!-- 氏名 -->
  <div class="sec-label">氏名</div>
  <input type="text" id="f-name" placeholder="例：山田 太郎">

  <!-- 特徴5項目 -->
  <div class="sec-label">自分の特徴（5項目）— 項目名を入力して、★で評価しよう</div>
  <div id="trait-inputs"></div>

  <!-- 好きなこと -->
  <div class="sec-label">好きなこと・ハマってること</div>
  <div class="tag-input-row">
    <input type="text" id="like-in" placeholder="例：バスケ、料理、ゲーム">
    <button onclick="addTag('like')">追加</button>
  </div>
  <div class="tags" id="like-tags"></div>

  <!-- 苦手なこと -->
  <div class="sec-label">苦手・嫌いなこと</div>
  <div class="tag-input-row">
    <input type="text" id="dis-in" placeholder="例：早起き、待つこと">
    <button onclick="addTag('dis')">追加</button>
  </div>
  <div class="tags" id="dis-tags"></div>

  <!-- 生成ボタン -->
  <button class="gen-btn" onclick="generate()">
    レーダーチャート＆プロンプトを生成 →
  </button>

  <!-- 結果 -->
  <div class="result-section" id="result-section">

    <!-- チャート -->
    <div class="result-card">
      <div class="result-card-title">わたしの特徴チャート</div>
      <div class="chart-wrap">
        <canvas id="radar" width="300" height="300"
          role="img" aria-label="特徴レーダーチャート"></canvas>
      </div>
      <p style="font-size:11px; color:#9CA3AF; text-align:center; margin-top:8px;">
        このチャートをスクリーンショット（📸）して保存しておこう！
      </p>
    </div>

    <!-- 日本語プロンプト -->
    <div class="result-card">
      <div class="result-card-title">キャラクターアイコン用プロンプト</div>
      <div class="prompt-text" id="prompt-ja"></div>
      <button class="copy-btn" id="copy-btn" onclick="copyPrompt()" style="margin-top:10px;">
        プロンプトをコピー
      </button>
      <div class="hint-banner" style="margin-top:12px;">
        💡 ヒント：プロンプトに「kawaii」「chibi」などを追加すると雰囲気が変わるよ！
      </div>
    </div>

  </div>

  <div class="footer">自己理解ワーク　わたしのプロフシートをつくろう</div>
</div>

<script>
const ratings = [3, 3, 3, 3, 3];
const traitNames = ['', '', '', '', ''];
const likeTags = [], disTags = [];
let radarChart = null;

// 特徴入力欄を生成
function renderTraits() {
  const c = document.getElementById('trait-inputs');
  c.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const row = document.createElement('div');
    row.className = 'trait-row';
    row.innerHTML = `
      <input type="text" placeholder="特徴 ${i+1}（例：やさしい）"
        value="${traitNames[i]}"
        oninput="traitNames[${i}]=this.value"
        style="flex:1;">
      <div class="stars" id="stars${i}"></div>`;
    c.appendChild(row);
    renderStars(i);
  }
}

function renderStars(i) {
  const c = document.getElementById('stars' + i);
  c.innerHTML = '';
  for (let s = 1; s <= 5; s++) {
    const b = document.createElement('div');
    b.className = 'star' + (s <= ratings[i] ? ' on' : '');
    b.textContent = '★';
    b.onclick = (function(idx, v) {
      return function() { ratings[idx] = v; renderStars(idx); };
    })(i, s);
    c.appendChild(b);
  }
}

// タグ追加
function addTag(type) {
  const el = document.getElementById(type + '-in');
  const v = el.value.trim();
  if (!v) return;
  (type === 'like' ? likeTags : disTags).push(v);
  el.value = '';
  renderTags(type);
}
function removeTag(type, i) {
  (type === 'like' ? likeTags : disTags).splice(i, 1);
  renderTags(type);
}
function renderTags(type) {
  const arr = type === 'like' ? likeTags : disTags;
  const c = document.getElementById(type + '-tags');
  c.innerHTML = arr.map((v, i) =>
    `<div class="tag" onclick="removeTag('${type}',${i})">${v}<span class="x">✕</span></div>`
  ).join('');
}

// Enterキーでタグ追加
['like', 'dis'].forEach(t => {
  document.getElementById(t + '-in').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTag(t);
  });
});

// 生成
function generate() {
  const name = document.getElementById('f-name').value.trim() || '名無し';
  const labels = traitNames.map((v, i) => v.trim() || `特徴${i+1}`);
  const data = ratings.slice();

  // ステップタブ更新
  document.getElementById('step2tab').className = 'step-tab active';
  document.getElementById('step3tab').className = 'step-tab active';

  // 結果表示
  const rs = document.getElementById('result-section');
  rs.style.display = 'block';
  rs.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // チャート描画
  setTimeout(() => {
    const cv = document.getElementById('radar');
    if (radarChart) radarChart.destroy();
    radarChart = new Chart(cv, {
      type: 'radar',
      data: {
        labels,
        datasets: [{
          label: name,
          data,
          backgroundColor: 'rgba(124,58,237,0.15)',
          borderColor: '#7C3AED',
          pointBackgroundColor: '#7C3AED',
          pointRadius: 5,
          borderWidth: 2
        }]
      },
      options: {
        responsive: false,
        scales: {
          r: {
            min: 0, max: 5,
            ticks: { stepSize: 1, display: false },
            pointLabels: { font: { size: 13 }, color: '#5B21B6' },
            grid: { color: 'rgba(167,139,250,0.25)' },
            angleLines: { color: 'rgba(167,139,250,0.25)' }
          }
        },
        plugins: { legend: { display: false } }
      }
    });
  }, 80);

  // プロンプト生成
  const star = n => '★'.repeat(n) + '☆'.repeat(5 - n);
  const traitsJa = labels.map((l, i) => `・${l}：${star(data[i])}（${data[i]}/5）`).join('\n');
  const likeStr = likeTags.length ? likeTags.join('、') : 'なし';
  const disStr = disTags.length ? disTags.join('、') : 'なし';

  document.getElementById('prompt-ja').textContent =
`名前：${name}
特徴：
${traitsJa}
好きなこと：${likeStr}
苦手なこと：${disStr}

上記の情報をもとに、この人物のキャラクターアイコンを生成してください。アニメ風イラスト、上半身、明るい背景、個性が伝わるデザインで。`;

}

// コピー
function copyPrompt() {
  const text = document.getElementById('prompt-ja').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'コピーしました！';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'プロンプトをコピー';
      btn.classList.remove('copied');
    }, 2500);
  });
}

// 初期化
renderTraits();
</script>
</body>
</html>
